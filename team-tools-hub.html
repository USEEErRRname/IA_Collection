<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>团队工具集合入口</title>
<style>
  :root{
    --ink:#1c2430;
    --paper:#f6f4ee;
    --panel:#ffffff;
    --line:#e1ddd0;
    --accent:#1f5c4f;
    --accent-soft:#e7f0ec;
    --muted:#7c7468;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
    line-height:1.5;
  }
  .wrap{max-width:980px;margin:0 auto;padding:28px 20px 60px;}
  header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px solid var(--ink);
    padding-bottom:14px;
    margin-bottom:24px;
    gap:16px;
  }
  header h1{font-size:22px;margin:0 0 4px;letter-spacing:.5px;}
  header .sub{color:var(--muted);font-size:12.5px;}
  header .brand{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex:none;}
  header .brand-logo{height:38px;width:auto;display:block;object-fit:contain;}
  header .tag{
    font-size:11px;
    background:var(--ink);
    color:var(--paper);
    padding:3px 9px;
    border-radius:2px;
    letter-spacing:1px;
  }
  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:6px;
    padding:18px 20px;
    margin-bottom:18px;
  }
  .panel h2{
    font-size:14px;
    margin:0 0 14px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .panel h2 .n{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:20px;
    height:20px;
    border-radius:50%;
    background:var(--accent);
    color:#fff;
    font-size:11px;
    flex:none;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:12px;
  }
  .entry{
    border:1px solid var(--line);
    background:#fafaf8;
    border-radius:6px;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:10px;
    min-height:140px;
  }
  .entry .biz{
    display:inline-block;
    font-size:11px;
    color:var(--accent);
    background:var(--accent-soft);
    border-radius:12px;
    padding:2px 8px;
    width:max-content;
    font-weight:600;
  }
  .entry h3{margin:0;font-size:17px;}
  .entry p{margin:0;color:var(--muted);font-size:12.5px;}
  .spacer{flex:1;}
  .btn{
    padding:9px 14px;
    border-radius:5px;
    border:1px solid var(--ink);
    background:var(--ink);
    color:#fff;
    font-size:13px;
    cursor:pointer;
  }
  .btn:hover{opacity:.88;}
  .btn.disabled{
    border-color:#c7c1b1;
    color:#8c8679;
    background:#edeae0;
    cursor:not-allowed;
  }
  .tip{
    margin-top:10px;
    font-size:12px;
    color:var(--muted);
  }
  @media (max-width:720px){
    .grid{grid-template-columns:1fr;}
  }
  @media (max-width:520px){
    header{align-items:flex-start;}
    header .brand-logo{height:32px;}
  }
</style>
</head>
<body>
  <main class="wrap">
    <header>
      <div>
        <h1>报价工具集合入口</h1>
      </div>
      <div class="brand">
        <img class="brand-logo" alt="施耐德电气 Logo" src="./assets/images/logo.png">
        <span class="tag">SCHNEIDER ELECTRIC</span>
      </div>
    </header>

    <section class="panel">
      <h2><span class="n">1</span>业务工具导航</h2>
      <div class="grid">
        <article class="entry">
          <span class="biz">LVD</span>
          <h3>LVD 低压变频</h3>
          <p>低压变频柜机报价工具。</p>
          <div class="spacer"></div>
          <button class="btn" type="button" onclick="window.location.href='./Ecofit低压变频柜机_报价工具.html'">进入工具</button>
        </article>

        <article class="entry">
          <span class="biz">REC</span>
          <h3>REC 维保</h3>
          <p>低压变频原厂维保报价工具。</p>
          <div class="spacer"></div>
          <button class="btn" type="button" onclick="window.location.href='./低压变频原厂维保_报价工具.html'">进入工具</button>
        </article>

        <article class="entry">
          <span class="biz">MVD</span>
          <h3>MVD 中压变频</h3>
          <p>当前暂无可用工具，入口已预留。</p>
          <div class="spacer"></div>
          <button class="btn disabled" type="button" disabled>暂未开放</button>
        </article>

        <article class="entry">
          <span class="biz">PLC</span>
          <h3>PLC 可编程逻辑控制器</h3>
          <p>当前暂无可用工具，入口已预留。</p>
          <div class="spacer"></div>
          <button class="btn disabled" type="button" disabled>暂未开放</button>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
